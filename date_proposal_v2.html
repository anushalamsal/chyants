<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fdf6f9;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .bg-dots {
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, #f9c6d8 1px, transparent 1px);
    background-size: 32px 32px;
    opacity: 0.35;
    pointer-events: none;
  }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.92);
    border-radius: 20px;
    border: 1px solid #f2c4d4;
    padding: 3rem 3.5rem;
    max-width: 480px;
    width: 90vw;
    text-align: center;
    animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #d4789a;
    margin-bottom: 1.4rem;
    font-weight: 300;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.6rem, 5vw, 2.2rem);
    font-weight: 300;
    color: #2d1a24;
    line-height: 1.4;
    margin-bottom: 2.5rem;
    font-style: italic;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #f2c4d4;
    margin: 0 auto 2.5rem;
  }

  .buttons {
    display: flex;
    gap: 1rem;
    justify-content: center;
    position: relative;
    min-height: 48px;
    align-items: center;
  }

  .btn-yes {
    background: #2d1a24;
    color: #fdf6f9;
    border: none;
    padding: 0.75rem 2.2rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }

  .btn-yes:hover { background: #4a2a3a; transform: scale(1.02); }

  .btn-no {
    background: transparent;
    color: #c9849f;
    border: 1px solid #f2c4d4;
    padding: 0.75rem 2.2rem;
    border-radius: 4px;
    font-size: 0.85rem;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    letter-spacing: 0.12em;
    cursor: pointer;
    position: absolute;
    right: 0;
    white-space: nowrap;
    transition: none;
  }

  .yay {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
  }

  .yay-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    color: #2d1a24;
    font-style: italic;
    font-weight: 300;
  }

  .yay-sub {
    font-size: 0.78rem;
    color: #d4789a;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="bg-dots"></div>

<div class="card">
  <p class="eyebrow">five years later</p>
  <h1 id="main-content">will you please go out on an actual date with me?</h1>
  <div class="divider"></div>

  <div class="buttons" id="btn-area">
    <button class="btn-yes" onclick="sayYes()">yes</button>
    <button class="btn-no" id="noBtn" onmouseover="moveNo()" ontouchstart="moveNo()">no</button>
  </div>

  <div class="yay" id="yay-msg">
    <div class="yay-text">can't wait.</div>
    <div class="yay-sub">see you soon</div>
  </div>
</div>

<script>
  const noBtn = document.getElementById('noBtn');
  const btnArea = document.getElementById('btn-area');

  function moveNo() {
    const maxX = Math.min(window.innerWidth * 0.3, 180);
    const maxY = Math.min(window.innerHeight * 0.25, 120);
    const randX = (Math.random() - 0.5) * maxX * 2;
    const randY = (Math.random() - 0.5) * maxY * 2;
    noBtn.style.transform = `translate(${randX}px, ${randY}px)`;
    noBtn.style.transition = 'transform 0.18s cubic-bezier(0.34,1.56,0.64,1)';
  }

  function sayYes() {
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('btn-area').style.display = 'none';
    document.querySelector('.divider').style.display = 'none';
    const yay = document.getElementById('yay-msg');
    yay.style.display = 'flex';
  }
</script>
</body>
</html>
